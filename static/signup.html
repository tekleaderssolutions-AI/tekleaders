<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | TekLeaders AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/auth.css?v=3">
</head>

<body>
    <div class="auth-page">
        <div class="auth-wrapper">
            <div class="auth-animation">
                <div id="lottie-animation"></div>
            </div>

            <div class="auth-form-panel">
                <div class="auth-header">
                    <h1>Create Account</h1>
                    <p>Sign up to start your recruitment journey</p>
                </div>

                <div id="error-message" class="error-message"></div>

                <form id="signup-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required placeholder="Enter your email" autofocus>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required minlength="6"
                            placeholder="Create a password">
                    </div>

                    <div class="form-group">
                        <label for="confirm_password">Confirm Password</label>
                        <input type="password" id="confirm_password" name="confirm_password" required minlength="6"
                            placeholder="Re-enter your password">
                    </div>

                    <button type="submit" class="btn">Sign Up</button>
                </form>

                <div class="auth-footer-link">
                    Already have an account? <a href="/static/login.html">Sign in</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <script src="/static/auth-api.js?v=6"></script>
    <script>
        lottie.loadAnimation({
            container: document.getElementById('lottie-animation'),
            renderer: 'svg',
            loop: true,
            autoplay: true,
            path: staticUrl('/static/register.json')
        });

        function formatErrorDetail(detail) {
            if (!detail) return 'Signup failed';
            if (typeof detail === 'string') return detail;
            if (Array.isArray(detail)) {
                return detail.map((d) => {
                    const field = (d.loc || []).filter((x) => x !== 'body').pop();
                    const msg = d.msg || 'Invalid value';
                    return field ? `${field}: ${msg}` : msg;
                }).join(' ');
            }
            return 'Signup failed';
        }

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            const errorDiv = document.getElementById('error-message');
            const button = e.target.querySelector('button');

            errorDiv.style.display = 'none';

            if (password !== confirmPassword) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.style.display = 'block';
                return;
            }

            if (password.length < 6) {
                errorDiv.textContent = 'Password must be at least 6 characters';
                errorDiv.style.display = 'block';
                return;
            }

            if (!email) {
                errorDiv.textContent = 'Email is required';
                errorDiv.style.display = 'block';
                return;
            }

            button.textContent = 'Creating account...';
            button.disabled = true;

            try {
                const { response, data } = await postSignup({
                    email,
                    username: email,
                    password,
                    confirm_password: confirmPassword
                });

                if (response.ok) {
                    window.location.href = `${getApiBase()}/static/login.html`;
                } else {
                    errorDiv.textContent = formatErrorDetail(data.detail);
                    errorDiv.style.display = 'block';
                    button.textContent = 'Sign Up';
                    button.disabled = false;
                }
            } catch (err) {
                errorDiv.textContent = 'Network error. Please try again.';
                errorDiv.style.display = 'block';
                button.textContent = 'Sign Up';
                button.disabled = false;
            }
        });
    </script>
</body>

</html>
