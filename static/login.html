<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | TekLeaders AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/auth.css?v=3">
</head>

<body>
    <div id="transition-overlay" class="transition-overlay">
        <div id="bot-animation-container"></div>
    </div>

    <div class="auth-page">
        <div class="auth-wrapper">
            <div class="auth-animation">
                <div id="lottie-animation"></div>
            </div>

            <div class="auth-form-panel">
                <div class="auth-header">
                    <h1>Welcome Back</h1>
                    <p>Sign in to access JD, candidates, and dashboard</p>
                </div>

                <div id="error-message" class="error-message"></div>

                <form id="login-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required placeholder="Enter your email" autofocus>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required placeholder="Enter your password">
                    </div>

                    <button type="submit" class="btn">Sign In</button>
                </form>

                <div class="auth-footer-link">
                    Don't have an account? <a href="/static/signup.html">Sign up</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <script src="/static/auth-api.js?v=6"></script>
    <script>
        lottie.loadAnimation({
            container: document.getElementById('lottie-animation'),
            renderer: 'svg',
            loop: true,
            autoplay: true,
            path: staticUrl('/static/login.json')
        });

        let transitionAnim = null;
        try {
            transitionAnim = lottie.loadAnimation({
                container: document.getElementById('bot-animation-container'),
                renderer: 'svg',
                loop: true,
                autoplay: false,
                path: staticUrl('/static/login_bot.json')
            });
        } catch (e) {
            console.error('Failed to preload transition animation', e);
        }

        function playTransitionAnimation() {
            const overlay = document.getElementById('transition-overlay');
            overlay.style.display = 'flex';
            void overlay.offsetWidth;
            overlay.classList.add('active');
            if (transitionAnim) {
                transitionAnim.goToAndPlay(0, true);
            }
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            const button = e.target.querySelector('button');

            errorDiv.style.display = 'none';
            button.textContent = 'Signing in...';
            button.disabled = true;

            try {
                const { response, data } = await postLogin({ email, password });

                if (response.ok) {
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('username', email);
                    document.cookie = `access_token=${data.access_token}; path=/; max-age=28800`;

                    playTransitionAnimation();
                    setTimeout(() => {
                        window.location.href = `${getApiBase()}/`;
                    }, 2000);
                } else {
                    errorDiv.textContent = data.detail || 'Invalid email or password';
                    errorDiv.style.display = 'block';
                    button.textContent = 'Sign In';
                    button.disabled = false;
                }
            } catch (err) {
                console.error(err);
                errorDiv.textContent = 'Network error. Please try again.';
                errorDiv.style.display = 'block';
                button.textContent = 'Sign In';
                button.disabled = false;
            }
        });
    </script>
</body>

</html>
